<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Recipe Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Recipe Generator</h1>
      </header>
      <main>
        <div class="form-container">
          <form id="recipe-generator-form">
            <input
              type="text"
              placeholder="Type ingredients or a dish you'd like to make..."
              autofocus
              required
              autocomplete="off"
              class="form-instructions"
              id="user-instructions"
            />

            <input type="submit" class="form-button" />
          </form>
          <div class="hint">i.e Chicken, Rice or Tomatoes</div>
        </div>

        <div class="recipe hidden" id="recipe"></div>
      </main>
      <br />

      <footer>
        Coded with 💜 by
        <a href="https://github.com/lmoramaga" target="_blank">Lina Moramaga</a>
        and is
        <a href="https://github.com/lmoramaga/recipe-generator" target="_blank"
          >open-sourced</a
        >
        and is hosted on
        <a href="https://recipe-generator-sfyl.onrender.com/" target="_blank"
          >Render</a
        >
      </footer>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
